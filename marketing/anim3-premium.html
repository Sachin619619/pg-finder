<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap');
body { font-family: 'Inter', sans-serif; width: 500px; height: 500px; overflow: hidden; }
.scene {
  width: 500px; height: 500px;
  background: #ffffff;
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}

/* Animated gradient blobs */
.blob {
  position: absolute; border-radius: 50%; filter: blur(60px);
  animation: morph 8s ease-in-out infinite;
}
.blob1 { top: -60px; right: -60px; width: 300px; height: 300px; background: rgba(168,85,247,0.15); animation-delay: 0s; }
.blob2 { bottom: -80px; left: -60px; width: 280px; height: 280px; background: rgba(236,72,153,0.1); animation-delay: 2s; }
.blob3 { top: 50%; left: -40px; width: 200px; height: 200px; background: rgba(59,130,246,0.08); animation-delay: 4s; }
@keyframes morph {
  0%, 100% { transform: scale(1) translate(0, 0); border-radius: 50%; }
  25% { transform: scale(1.1) translate(15px, -10px); border-radius: 45% 55% 50% 50%; }
  50% { transform: scale(0.95) translate(-10px, 15px); border-radius: 55% 45% 50% 50%; }
  75% { transform: scale(1.05) translate(10px, 10px); border-radius: 50% 50% 45% 55%; }
}

/* Sparkles */
.sparkle {
  position: absolute; width: 8px; height: 8px;
  animation: sparkle-pop 3s ease-in-out infinite;
  opacity: 0;
}
.sparkle::before, .sparkle::after {
  content: ''; position: absolute; background: #a855f7; border-radius: 100px;
}
.sparkle::before { width: 8px; height: 2px; top: 3px; left: 0; }
.sparkle::after { width: 2px; height: 8px; top: 0; left: 3px; }
.sp1 { top: 100px; left: 80px; animation-delay: 0s; }
.sp2 { top: 80px; right: 90px; animation-delay: 0.8s; }
.sp3 { bottom: 120px; left: 100px; animation-delay: 1.6s; }
.sp4 { bottom: 90px; right: 70px; animation-delay: 2.4s; }
.sp5 { top: 200px; left: 50px; animation-delay: 0.4s; }
.sp6 { top: 180px; right: 50px; animation-delay: 1.2s; }
.sp7 { bottom: 180px; left: 60px; animation-delay: 2s; }
.sp8 { bottom: 160px; right: 80px; animation-delay: 0.6s; }
@keyframes sparkle-pop {
  0%, 100% { opacity: 0; transform: scale(0) rotate(0deg); }
  20% { opacity: 1; transform: scale(1) rotate(15deg); }
  40% { opacity: 1; transform: scale(1.2) rotate(30deg); }
  60% { opacity: 0; transform: scale(0.5) rotate(45deg); }
}

/* Floating dots orbit */
.dot-orbit {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 340px; height: 340px;
  animation: orbit-spin 20s linear infinite;
}
.orbit-dot {
  position: absolute; border-radius: 50%;
}
.od1 { top: 0; left: 50%; transform: translateX(-50%); width: 8px; height: 8px; background: linear-gradient(135deg, #7c3aed, #a855f7); box-shadow: 0 0 12px rgba(124,58,237,0.4); }
.od2 { bottom: 0; left: 50%; transform: translateX(-50%); width: 6px; height: 6px; background: linear-gradient(135deg, #ec4899, #f472b6); box-shadow: 0 0 10px rgba(236,72,153,0.4); }
.od3 { top: 50%; left: 0; transform: translateY(-50%); width: 5px; height: 5px; background: linear-gradient(135deg, #3b82f6, #60a5fa); box-shadow: 0 0 8px rgba(59,130,246,0.4); }
.od4 { top: 50%; right: 0; transform: translateY(-50%); width: 7px; height: 7px; background: linear-gradient(135deg, #f97316, #fb923c); box-shadow: 0 0 10px rgba(249,115,22,0.4); }
@keyframes orbit-spin { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }

/* Butterfly */
.butterfly {
  position: absolute; animation: butterfly-fly 12s ease-in-out infinite;
  opacity: 0;
}
.butterfly svg { width: 28px; height: 24px; }
.wing-l { animation: wing-flap-l 0.3s ease-in-out infinite alternate; transform-origin: right center; }
.wing-r { animation: wing-flap-r 0.3s ease-in-out infinite alternate; transform-origin: left center; }
@keyframes wing-flap-l { 0% { transform: scaleX(1); } 100% { transform: scaleX(0.3); } }
@keyframes wing-flap-r { 0% { transform: scaleX(1); } 100% { transform: scaleX(0.3); } }
@keyframes butterfly-fly {
  0% { top: 60%; left: -5%; opacity: 0; transform: rotate(-5deg); }
  5% { opacity: 0.8; }
  15% { top: 30%; left: 15%; transform: rotate(5deg); }
  30% { top: 20%; left: 35%; transform: rotate(-3deg); }
  45% { top: 25%; left: 55%; transform: rotate(8deg); }
  60% { top: 15%; left: 75%; transform: rotate(-5deg); }
  75% { top: 35%; left: 90%; transform: rotate(3deg); opacity: 0.8; }
  85% { opacity: 0; }
  100% { top: 50%; left: 105%; opacity: 0; transform: rotate(0deg); }
}

/* Logo */
.logo-wrap { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 20px; }
.icon-box {
  width: 180px; height: 180px;
  background: linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #ec4899 100%);
  border-radius: 48px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 24px 80px rgba(124,58,237,0.3), 0 8px 24px rgba(124,58,237,0.15);
  position: relative;
  animation: icon-breathe 4s ease-in-out infinite;
}
@keyframes icon-breathe {
  0%, 100% { transform: scale(1); box-shadow: 0 24px 80px rgba(124,58,237,0.3), 0 8px 24px rgba(124,58,237,0.15); }
  50% { transform: scale(1.03); box-shadow: 0 28px 90px rgba(124,58,237,0.4), 0 10px 30px rgba(124,58,237,0.2); }
}
.icon-box::after {
  content: ''; position: absolute;
  top: 6px; left: 6px; right: 6px; height: 45%;
  background: linear-gradient(to bottom, rgba(255,255,255,0.3), transparent);
  border-radius: 44px 44px 80px 80px;
}
/* Shine sweep */
.icon-box::before {
  content: ''; position: absolute; inset: 0; border-radius: 48px; overflow: hidden;
  background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.15) 45%, rgba(255,255,255,0.25) 50%, rgba(255,255,255,0.15) 55%, transparent 60%);
  animation: icon-shine 5s ease-in-out infinite;
  z-index: 3;
}
@keyframes icon-shine {
  0%, 100% { transform: translateX(-150%); }
  50% { transform: translateX(150%); }
}
.icon-box svg { width: 85px; height: 85px; color: white; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15)); position: relative; z-index: 2; }

.brand { text-align: center; }
.brand .name { font-size: 34px; font-weight: 900; color: #1f2937; letter-spacing: -1px; }
.brand .name span { background: linear-gradient(135deg, #7c3aed, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.brand .loc { font-size: 12px; font-weight: 800; color: #a78bfa; letter-spacing: 5px; text-transform: uppercase; margin-top: 2px; }
</style>
</head>
<body>
<div class="scene">
  <!-- Blobs -->
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>

  <!-- Sparkles -->
  <div class="sparkle sp1"></div><div class="sparkle sp2"></div><div class="sparkle sp3"></div><div class="sparkle sp4"></div>
  <div class="sparkle sp5"></div><div class="sparkle sp6"></div><div class="sparkle sp7"></div><div class="sparkle sp8"></div>

  <!-- Orbiting dots -->
  <div class="dot-orbit">
    <div class="orbit-dot od1"></div>
    <div class="orbit-dot od2"></div>
    <div class="orbit-dot od3"></div>
    <div class="orbit-dot od4"></div>
  </div>

  <!-- Butterfly -->
  <div class="butterfly">
    <svg viewBox="0 0 28 24" fill="none">
      <ellipse class="wing-l" cx="7" cy="10" rx="7" ry="9" fill="rgba(168,85,247,0.5)" />
      <ellipse class="wing-r" cx="21" cy="10" rx="7" ry="9" fill="rgba(236,72,153,0.4)" />
      <ellipse cx="14" cy="12" rx="1.5" ry="8" fill="rgba(100,60,200,0.6)" />
    </svg>
  </div>

  <!-- Logo -->
  <div class="logo-wrap">
    <div class="icon-box">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.6">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
      </svg>
    </div>
    <div class="brand">
      <div class="name">PG <span>Finder</span></div>
      <div class="loc">Bangalore</div>
    </div>
  </div>
</div>
</body>
</html>
