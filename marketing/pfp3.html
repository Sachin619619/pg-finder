<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap');
body { font-family: 'Inter', sans-serif; width: 500px; height: 500px; overflow: hidden; }
.pic {
  width: 500px; height: 500px;
  background: #ffffff;
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.bg-shape1 {
  position: absolute; top: -100px; right: -100px; width: 350px; height: 350px;
  background: linear-gradient(135deg, #ede9fe, #ddd6fe);
  border-radius: 50%;
  opacity: 0.7;
}
.bg-shape2 {
  position: absolute; bottom: -80px; left: -80px; width: 300px; height: 300px;
  background: linear-gradient(135deg, #fce7f3, #fbcfe8);
  border-radius: 50%;
  opacity: 0.5;
}
.content {
  position: relative; z-index: 2;
  display: flex; flex-direction: column; align-items: center; gap: 20px;
}
.icon-box {
  width: 180px; height: 180px;
  background: linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #ec4899 100%);
  border-radius: 48px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 24px 80px rgba(124,58,237,0.35), 0 8px 24px rgba(124,58,237,0.2);
  position: relative;
}
.icon-box::after {
  content: '';
  position: absolute; top: 8px; left: 8px; right: 8px; height: 40%;
  background: linear-gradient(to bottom, rgba(255,255,255,0.25), transparent);
  border-radius: 42px 42px 60px 60px;
}
.icon-box svg {
  width: 90px; height: 90px; color: white;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
  position: relative; z-index: 2;
}
.brand {
  text-align: center;
}
.brand .name {
  font-size: 36px; font-weight: 900; color: #1f2937;
  letter-spacing: -1px;
}
.brand .name span {
  background: linear-gradient(135deg, #7c3aed, #a855f7);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.brand .loc {
  font-size: 13px; font-weight: 800; color: #a78bfa;
  letter-spacing: 5px; text-transform: uppercase; margin-top: 2px;
}
</style>
</head>
<body>
<div class="pic">
  <div class="bg-shape1"></div>
  <div class="bg-shape2"></div>
  <div class="content">
    <div class="icon-box">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
      </svg>
    </div>
    <div class="brand">
      <div class="name">PG <span>Finder</span></div>
      <div class="loc">Bangalore</div>
    </div>
  </div>
</div>
</body>
</html>
