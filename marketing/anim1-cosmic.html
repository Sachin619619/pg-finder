<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap');
body { font-family: 'Inter', sans-serif; width: 500px; height: 500px; overflow: hidden; }
.scene {
  width: 500px; height: 500px;
  background: linear-gradient(145deg, #0a0618 0%, #120b2e 35%, #1e0f45 65%, #0a0618 100%);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}

/* Orbs breathing */
.orb { position: absolute; border-radius: 50%; }
.orb1 { top: -80px; right: -60px; width: 300px; height: 300px; background: radial-gradient(circle, rgba(168,85,247,0.3), transparent 70%); animation: breathe 4s ease-in-out infinite; }
.orb2 { bottom: -100px; left: -60px; width: 350px; height: 350px; background: radial-gradient(circle, rgba(236,72,153,0.2), transparent 70%); animation: breathe 5s ease-in-out infinite 1s; }
.orb3 { top: 40%; left: 30%; width: 200px; height: 200px; background: radial-gradient(circle, rgba(59,130,246,0.12), transparent 70%); animation: breathe 6s ease-in-out infinite 2s; }

@keyframes breathe {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.2); opacity: 0.7; }
}

/* Stars */
.star {
  position: absolute; width: 3px; height: 3px; background: white; border-radius: 50%;
  animation: twinkle 2s ease-in-out infinite;
}
.star:nth-child(1) { top: 8%; left: 15%; animation-delay: 0s; }
.star:nth-child(2) { top: 12%; right: 20%; animation-delay: 0.5s; width: 2px; height: 2px; }
.star:nth-child(3) { top: 25%; left: 8%; animation-delay: 1s; }
.star:nth-child(4) { bottom: 20%; right: 12%; animation-delay: 1.5s; width: 2px; height: 2px; }
.star:nth-child(5) { top: 40%; right: 8%; animation-delay: 0.3s; }
.star:nth-child(6) { bottom: 30%; left: 18%; animation-delay: 0.8s; width: 2px; height: 2px; }
.star:nth-child(7) { top: 15%; left: 45%; animation-delay: 1.2s; width: 2px; height: 2px; }
.star:nth-child(8) { bottom: 12%; right: 35%; animation-delay: 0.6s; }
.star:nth-child(9) { top: 55%; left: 5%; animation-delay: 1.8s; width: 2px; height: 2px; }
.star:nth-child(10) { bottom: 8%; left: 40%; animation-delay: 0.2s; }

@keyframes twinkle {
  0%, 100% { opacity: 0.2; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.5); }
}

/* Shooting star */
.shooting-star {
  position: absolute; top: 15%; left: -10%;
  width: 80px; height: 2px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
  border-radius: 100px;
  animation: shoot 4s ease-in-out infinite 2s;
  transform: rotate(-25deg);
  opacity: 0;
}
.shooting-star2 {
  position: absolute; top: 35%; left: -10%;
  width: 60px; height: 1.5px;
  background: linear-gradient(90deg, transparent, rgba(168,85,247,0.8), transparent);
  border-radius: 100px;
  animation: shoot 5s ease-in-out infinite 4s;
  transform: rotate(-20deg);
  opacity: 0;
}
@keyframes shoot {
  0% { left: -10%; opacity: 0; }
  5% { opacity: 1; }
  30% { left: 110%; opacity: 0; }
  100% { left: 110%; opacity: 0; }
}

/* Birds */
.bird {
  position: absolute;
  animation: fly 8s linear infinite;
  opacity: 0;
}
.bird svg { width: 20px; height: 20px; fill: none; stroke: rgba(255,255,255,0.4); stroke-width: 1.5; }
.bird1 { top: 22%; animation-delay: 1s; }
.bird1 svg { width: 18px; height: 18px; }
.bird2 { top: 18%; animation-delay: 1.4s; }
.bird2 svg { width: 14px; height: 14px; stroke: rgba(255,255,255,0.25); }
.bird3 { top: 26%; animation-delay: 1.8s; }
.bird3 svg { width: 12px; height: 12px; stroke: rgba(255,255,255,0.2); }

.bird svg path { animation: flap 0.4s ease-in-out infinite alternate; transform-origin: center; }
@keyframes flap {
  0% { d: path("M2 8 Q7 2 12 8 Q17 2 22 8"); }
  100% { d: path("M2 8 Q7 6 12 8 Q17 6 22 8"); }
}

@keyframes fly {
  0% { left: -8%; opacity: 0; transform: translateY(0px); }
  5% { opacity: 0.8; }
  25% { transform: translateY(-8px); }
  50% { transform: translateY(4px); }
  75% { transform: translateY(-6px); }
  90% { opacity: 0.8; }
  95% { opacity: 0; }
  100% { left: 108%; opacity: 0; transform: translateY(0px); }
}

/* Floating particles */
.particle {
  position: absolute; border-radius: 50%;
  animation: float-up 6s ease-in-out infinite;
  opacity: 0;
}
.p1 { bottom: 0; left: 20%; width: 4px; height: 4px; background: rgba(168,85,247,0.5); animation-delay: 0s; }
.p2 { bottom: 0; left: 50%; width: 3px; height: 3px; background: rgba(236,72,153,0.4); animation-delay: 1s; }
.p3 { bottom: 0; right: 25%; width: 5px; height: 5px; background: rgba(124,58,237,0.3); animation-delay: 2s; }
.p4 { bottom: 0; left: 35%; width: 3px; height: 3px; background: rgba(192,132,252,0.4); animation-delay: 3s; }
.p5 { bottom: 0; right: 40%; width: 4px; height: 4px; background: rgba(168,85,247,0.3); animation-delay: 4s; }
.p6 { bottom: 0; left: 70%; width: 3px; height: 3px; background: rgba(236,72,153,0.3); animation-delay: 1.5s; }

@keyframes float-up {
  0% { transform: translateY(0) scale(0); opacity: 0; }
  10% { opacity: 0.8; transform: translateY(-30px) scale(1); }
  50% { opacity: 0.5; }
  100% { transform: translateY(-450px) scale(0.3); opacity: 0; }
}

/* Logo */
.logo-container { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.logo-box {
  width: 200px; height: 200px;
  background: linear-gradient(135deg, #7c3aed 0%, #a855f7 40%, #c084fc 100%);
  border-radius: 52px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 20px 80px rgba(124,58,237,0.5), 0 0 120px rgba(168,85,247,0.15);
  animation: logo-glow 3s ease-in-out infinite;
  position: relative;
}
.logo-box::before {
  content: '';
  position: absolute; inset: -3px; border-radius: 55px;
  background: linear-gradient(135deg, rgba(255,255,255,0.25), transparent 50%, rgba(255,255,255,0.08));
  z-index: -1;
}
.logo-box::after {
  content: ''; position: absolute; inset: 0; border-radius: 52px;
  background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.08) 50%, transparent 60%);
  animation: shine-sweep 4s ease-in-out infinite;
}
@keyframes shine-sweep {
  0%, 100% { transform: translateX(-100%) rotate(25deg); }
  50% { transform: translateX(100%) rotate(25deg); }
}
@keyframes logo-glow {
  0%, 100% { box-shadow: 0 20px 80px rgba(124,58,237,0.5), 0 0 80px rgba(168,85,247,0.15); }
  50% { box-shadow: 0 20px 100px rgba(124,58,237,0.7), 0 0 140px rgba(168,85,247,0.25); }
}
.letter { color: white; font-size: 110px; font-weight: 900; line-height: 1; text-shadow: 0 4px 20px rgba(0,0,0,0.3); position: relative; z-index: 2; }
.sub { color: rgba(255,255,255,0.6); font-size: 15px; font-weight: 800; letter-spacing: 7px; text-transform: uppercase; margin-top: 16px; }

/* Ring pulse */
.ring {
  position: absolute; border: 1px solid rgba(168,85,247,0.15); border-radius: 52px;
  animation: ring-pulse 3s ease-out infinite;
}
.ring1 { inset: -8px; animation-delay: 0s; }
.ring2 { inset: -8px; animation-delay: 1s; }
.ring3 { inset: -8px; animation-delay: 2s; }
@keyframes ring-pulse {
  0% { transform: scale(1); opacity: 0.6; }
  100% { transform: scale(1.6); opacity: 0; }
}
</style>
</head>
<body>
<div class="scene">
  <!-- Stars -->
  <div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div>
  <div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div>

  <!-- Shooting stars -->
  <div class="shooting-star"></div>
  <div class="shooting-star2"></div>

  <!-- Orbs -->
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <!-- Birds -->
  <div class="bird bird1"><svg viewBox="0 0 24 16"><path d="M2 8 Q7 2 12 8 Q17 2 22 8" stroke-linecap="round"/></svg></div>
  <div class="bird bird2"><svg viewBox="0 0 24 16"><path d="M2 8 Q7 2 12 8 Q17 2 22 8" stroke-linecap="round"/></svg></div>
  <div class="bird bird3"><svg viewBox="0 0 24 16"><path d="M2 8 Q7 2 12 8 Q17 2 22 8" stroke-linecap="round"/></svg></div>

  <!-- Particles -->
  <div class="particle p1"></div><div class="particle p2"></div><div class="particle p3"></div>
  <div class="particle p4"></div><div class="particle p5"></div><div class="particle p6"></div>

  <!-- Logo -->
  <div class="logo-container">
    <div class="logo-box">
      <div class="ring ring1"></div>
      <div class="ring ring2"></div>
      <div class="ring ring3"></div>
      <span class="letter">P</span>
    </div>
    <span class="sub">FINDER</span>
  </div>
</div>
</body>
</html>
