<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap');
body { font-family: 'Inter', sans-serif; width: 500px; height: 500px; overflow: hidden; }
.pic {
  width: 500px; height: 500px;
  background: linear-gradient(145deg, #0f0826 0%, #1a0e3e 40%, #2d1b69 70%, #1a0e3e 100%);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.orb1 { position: absolute; top: -60px; right: -60px; width: 280px; height: 280px; background: radial-gradient(circle, rgba(168,85,247,0.35), transparent 70%); border-radius: 50%; }
.orb2 { position: absolute; bottom: -80px; left: -40px; width: 300px; height: 300px; background: radial-gradient(circle, rgba(236,72,153,0.2), transparent 70%); border-radius: 50%; }
.orb3 { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 200px; height: 200px; background: radial-gradient(circle, rgba(124,58,237,0.15), transparent 70%); border-radius: 50%; }
.logo-box {
  width: 220px; height: 220px;
  background: linear-gradient(135deg, #7c3aed 0%, #a855f7 40%, #c084fc 100%);
  border-radius: 56px;
  display: flex; align-items: center; justify-content: center;
  position: relative; z-index: 2;
  box-shadow: 0 20px 80px rgba(124,58,237,0.5), 0 0 120px rgba(168,85,247,0.2);
}
.logo-box::before {
  content: '';
  position: absolute; inset: -3px;
  border-radius: 59px;
  background: linear-gradient(135deg, rgba(255,255,255,0.3), transparent 50%, rgba(255,255,255,0.1));
  z-index: -1;
}
.inner {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
.letter {
  color: white;
  font-size: 120px;
  font-weight: 900;
  line-height: 1;
  text-shadow: 0 4px 20px rgba(0,0,0,0.2);
}
.sub {
  color: rgba(255,255,255,0.7);
  font-size: 16px;
  font-weight: 800;
  letter-spacing: 8px;
  text-transform: uppercase;
}
</style>
</head>
<body>
<div class="pic">
  <div class="orb1"></div>
  <div class="orb2"></div>
  <div class="orb3"></div>
  <div class="logo-box">
    <div class="inner">
      <span class="letter">P</span>
      <span class="sub">FINDER</span>
    </div>
  </div>
</div>
</body>
</html>
